<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>NIONIO BLANK v4.0</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        #log { height: 300px; overflow-y: auto; border: 1px solid #0f0; padding: 10px; margin-bottom: 10px; background: #050505; }
        input { width: 100%; background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; outline: none; box-sizing: border-box; }
        .n { color: #0ff; font-weight: bold; }
    </style>
</head>
<body>
    <h3>NIONIO TERMINAL [STATUS: ONLINE]</h3>
    <div id="log">System załadowany. Czekam na polecenie... Hau!</div>
    <input type="text" id="cmd" placeholder="Wpisz wiadomość i naciśnij Enter...">

    <script>
        // ROZDZIELONY KLUCZ - WPISZ TYLKO RESZTĘ PO hf_
        const k1 = 'hf_'; 
        const k2 = 'bIyssVTafnSPAbfyLfVmcHhuqrZauhXfLM'; 
        const TOKEN = k1 + k2;

        const inp = document.getElementById('cmd');
        const box = document.getElementById('log');

        inp.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const txt = inp.value.trim();
                if (!txt) return;
                
                box.innerHTML += `<div>> ${txt}</div>`;
                inp.value = '';

                try {
                    // Testujemy lżejszy model, który rzadziej ma fochy
                    const r = await fetch("https://api-inference.huggingface.co", {
                        method: "POST",
                        headers: { 
                            "Authorization": "Bearer " + TOKEN, 
                            "Content-Type": "application/json" 
                        },
                        body: JSON.stringify({ 
                            inputs: `Jesteś Nionio - pies asystent. Odpowiedz krótko po polsku: ${txt}`,
                            parameters: { "max_new_tokens": 100 }
                        })
                    });

                    const data = await r.json();
                    
                    // ANALIZA ODPOWIEDZI
                    if (data.error) {
                        box.innerHTML += `<div style="color:red">Błąd AI: ${data.error}</div>`;
                    } else if (Array.isArray(data) && data[0].generated_text) {
                        const odp = data[0].generated_text.split("Odpowiedz krótko po polsku jako pies Nionio:")[1] || data[0].generated_text;
                        box.innerHTML += `<div class="n">Nionio: ${odp}</div>`;
                    } else {
                        box.innerHTML += `<div style="color:orange">Nionio: Hau? (Nieoczekiwana odpowiedź serwera)</div>`;
                    }

                } catch (err) {
                    box.innerHTML += `<div style="color:red">Błąd połączenia: ${err.message}</div>`;
                }
                box.scrollTop = box.scrollHeight;
            }
        });
    </script>
</body>
</html>
